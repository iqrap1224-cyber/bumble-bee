<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home | Bumble Bee</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="stars"></div>

<div id="shooting-stars"></div>

<div class="container">

<div class="glass">

<h1 class="logo">
Home
</h1>

<h3 id="chapterTitle">
Welcome Home
</h3>

<p id="message">

Hi Bumble Bee ❤️

<br><br>

I made this little world just for you.

<br><br>

Whenever life gets too heavy...

come home.

</p>

<input
type="password"
id="passwordBox"
placeholder="Our Secret Password">

<div class="buttons">

<button id="nextBtn">

Enter

</button>

<button id="hugBtn">

Emergency Hug

</button>

</div>

</div>

</div>

<!-- Emergency Hug -->

<div id="hugScreen">

<div class="hugCard">

<h2>

🤍

</h2>

<h3>

Take a deep breath.

</h3>

<p>

You don't have to be okay.

You don't have to smile.

You don't have to prove anything.

Rest here.

I'm not going anywhere.

❤️

</p>

<button id="closeHug">

Go Back

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
